repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        types_or: [html, css, javascript]
      - id: end-of-file-fixer
        types_or: [html, css, javascript]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: prettier
        name: Prettier (HTML/CSS/JS)
        entry: node_modules/.bin/prettier --write
        language: system
        files: \.(html|css|js)$
        exclude: ^archive/

      - id: htmlhint
        name: HTMLHint (HTML structure)
        entry: node_modules/.bin/htmlhint --config .htmlhintrc
        language: system
        files: \.html$
        exclude: ^archive/
